body:
  text: 赤雅地理類十外紀之屬提要臣等謹案赤雅三卷明鄺露撰露字湛若南海人鈕琇觚賸載其為諸生應嵗試時題為文行忠信乃四比立格以真草𨽻篆四體書之坐是被斥盖亦放誕之士王士禎池北偶談又載其少遊金陵客阮大鋮之門嘗為大鋮作集序大鋮亦為露作集序其人殊不足重迨國朝順治初王師入粤露義不改節竟抱所寳古琴不食而死士禎詩所謂南海畸人死抱琴者即為露作其志節乃為世所稱然露托契閹兒所作嶠雅屢稱大鋮為石巢夫子實貽譏於名教後雖晩盖僅足自贖固不能與黄淳耀等皦然日月争光也是書乃露遊廣西之時編厯岑藍胡侯槃五姓土司因為猺女雲亸孃留掌書記歸而述所見聞所記山川物産皆詞藻簡雅序次典核不在范成大桂海虞衡志下可稱佳本惟中間叙岑氏猺女被服名目溪峝中必無此綺麗露盖摭古事以文飾之又敘猩猩一條太不近情敘木客一條既稱為秦時採木之人何以能作律詩所稱細雨詩劎閣鈴逾動長門燭更深一聫何以能用漢唐故事是則附㑹塗飾不免文士之積習存而不論可矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b2d45ea720df9f8c162871fc7197d3d61d2a3bf4e9afe3482d41d736c54a9ac6
