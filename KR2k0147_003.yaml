body:
  text: 赤雅卷三明鄺露撰鳥獸蟲魚雍州鳯南漢時雍州有六鳯凰高五尺金冠五彩飛入城中衆鳥朝之文若布錦其鳴節節足足許善心文足足懷仁般般擾義般般麒麟足狀二語之竒亦文筆之鳴鳯也白州鳯宋景德白州有三鳯南來飛入城中羣鳥隨之身長九尺高五尺備五彩冠金杯至萬夀寺栖于百尺木龍樹上自歌自舞音中笙簧緑含鳯博白逺村號緑含高山大樹人迹罕至斗米一二錢其山多鳯有高三尺者冠彩與白州同其止其飛衆鳥皆隨常栖高樹之巔晴明則雙飛而出又有大如鵝者五色金冠尾甚長羽聲􅖇􅖇響若轉輪諸鳥見之斂翼俯首伏不敢鳴俗名大頸鳯間為猺獞所射獻其肉備衆美緝毛成裘涅而不滓紫鳯之庖不必皆沃民之國也宜州鳯至正間宜州述昆鄉鳯鳥見羣鳥蔽天其一飛去為獞人射殺嗚呼厄麟有西狩之獲元緒有枯桑之嗟白龍有魚服之感物益靈而數益竒矣可奈何兩江鳴鳯鳴鳯如孔雀紺碧頭上彩毫光逾掣電冠上垂二弱骨長一尺五寸鳴聲清越如簫笙能變曲妙合宫商間出兩江溪洞中豫謂緑含即紫鳯鳴鳯即青鳥也鳯凰出于丹穴豈不信然孝鷯唐武德宣撫使得秦吉鷯能歌舞者上之歲餘不語上怪而問之答曰身居南土生長禽中父母殊方有懷綿默上憐之賜金環令使者送還比歸舊鳥已死鷯以所賜殉鄉人感焉為之立冢冢在藤縣鴆雍州朝天鋪及山深處有之其種有二一大如鴉黑身赤目一大如梟毛紫緑色頸長七八寸雄曰連闕雌曰隂諧聲如羯鼓遇毒蛇則鳴聲邦邦蛇石穴禹步作法石裂蛇出秋冬間解羽蟄穴薰之出走應弦而斃以犀甲取膽著銀瓶否則指斷鴆矢著人立死鴆羽櫟酒犀角立解鴆穴多犀天地所以制殺機也鶬鸆鶬鸆不祥鳥也似鵩而散尾聲最哀帝嚳書曰逆鶬爾雅曰鶬縻枯啼苦泣血如杜鶻豫在鬼門見之一首九尾聞之九首者雄鶬猶虺之九首者雄虺也俗名鬼車豫貪看此鳥人爭危為不祥豫謂此鳥不産南中天氣自北而南諸君所謂不祥者安知非福王母王母若練雀青色尾最長有錢如孔雀猺中有王母裘織成錢文豫意以為西王母所服雲嚲娘笑曰君不聞子規夜啼山竹裂王母晝下雲旗翻耶天雞天雞朱冠錦尾其飛也翔㺯晴對舞天雞鳴而潮雞鳴潮雞鳴而家雞鳴謝康樂天雞㺯和風得之矣鷫鸘林邑有鳥其飛肅肅必兆隕霜織而為裘可以禦寒人多不知其名豫謂即古鷫鸘也北鶴止不向明巢必拱北其聲圓吭百變不窮吳時越巂獻背明鳥即此鈎鵅鈎鵅不祥鳥也形質短小鳴如冷笑入城城空入宅宅滅聞之速辟否則死亡深掘貓首烏喙似鵂鶹而大放聲而哭哭畢曰深掘深掘意賈生所謂鵩也訓胡訓胡惡鳥也鳴則後竅應之山都山都形如崑崙青毛有尾見人輒閉目張口如笑好在深澗中覔蟹食之猩猩人面猿身最機警通八方言學蟲鳥語無不曲肖聲如二八女子啼最清越嗜酒好屣虞人以此誘之豫在緑鴉山見之羣相語曰客必東人也踴躍出視豫適有蘇酒一包寄酒少許召而飲之四者齊下未飲先謝既飲輒醉知豫之無機也豫徘徊恐為後人所害忽古木間一雙飛下翩然相謂曰上客過勞兒當負之而去耳禮曰猩猩能言不離走獸豫終不敢以為信􅍛􅍛􅍛􅍛梟獍也見人則握手而笑然後食之人因以竹筒貫臂姑與之握握則必笑笑則上唇掩目曲臂以鑿綴其唇於額格而殺之吳都賦云猩猩啼而就擒􅍛􅍛笑而被格狒狒狒狒狀如猴力舉百鈞人言鳥音能知生死笑似􅍛􅍛上吻覆額血可染緋䯱髵紅髮飲其血能見鬼物荼荼出羇縻州似鹿兩頭食香草其行如飛鳴曰蔡茂蔡茂荼二字音蔡茂也亦有五六頭者是名玄仙敬之終吉射之致亡子路熊名子路穴居穴有神人冬蟄春啓非其時則主兵見穢合穴死食鹽亦食其膽春在首夏在腹秋在左足冬在右足前曰掌後曰蹯黑而脫喙去穴五百里壘石為館名曰熊館升木引氣名曰熊經獞人呼之子路出即出子路鬬即鬬聞有緑者猺獞取為駿馬障泥塵不敢揚威懾虎豹一尺百金其牝曰羆力能拔樹指如鋒攢披髮人立遇虎豹樵牧皆抗其喉揑血飲之其胸白脂名曰羆白味過熊掌懶婦懶婦似豪豬而小好食黍黍田畯以機杼織袵懸于田塍望之而走齒長入海化為巨魚其名奔䱐其狀蛟螭雙乳垂腹取以煎油其膏百斛澆蠟作燭取以飲酒紫熖生花令人發興取以讀書昏昧泯墨必至黑暗作詩自嘲曰丁年闕奔䱐燭雨夜誰傳太史書糖牛糖牛與毒蛇同穴嗜鹽土人以蛇浣手褁鹽探之角若瓊玖用以為甲鴆箭蛇鎗如涼雨之灑荷葉白貘貘生銅坑中象鼻犀目牛尾虎足食銅鐡不茹他物衣其皮殺鬼精鍊糞為兵可以切玉接溺為水可以銷鐵有十頭者謂之白貘蜀都賦戟食鐡之獸射噬毒之鹿則指貊也貊似熊與貘不同肉翅虎肉翅虎出石抱山晨伏宵出其飛也鬯嘗向鬼關食人為獞人射殺豫得見之比虎差小翅如蝙蝠眼閃閃如隂磷身虎文飾其皮以辟百鬼禍斗禍斗似犬而食犬糞噴火作殃不祥之獸麝麝食艾草冬至香滿入春則臍急悶跳躍剔出之剔出之香著百草皆枯佳人採芳拾以相贈馨香盈袖經年不歇今之為麝者生而割之天香未藴臍穢尚腥調以酥酪和以百草微香差見失其性矣嗚呼生售而失其性豈獨一麝也哉彖彖耳濈濈其大如掌行動鼓舞目常帶笑有歡悅發揚之意狀似犀而角小居草茅而知吉凶生于西粵東曰茒犀西曰豬神遇之則吉罔敢有害馴龍巖穴之下有馴龍焉靚女欲見之盛飾入巖唱土歌龍出五色照灼馴習如素望之若山海圖中珥蛇者神也歌至絶倫龍喜躍盤入懷中遺鱗而去女即珍藏以為獲神之貺鄰女必賀笙簫雲合豫逐隊往觀鱗大如錢光具衆色燁燁不定聞稍侮之則雷電掣去輒罹殃咎越日豫自太平至模闕入巖怪石飛泉種種異狀中有一洞從洞左轉深翠黝蒼持炬而入行二百步七折有穴內濶外狹冷氣襲人穴內嘯聲忽發裂如擪笛巖石振竦又靚女之所未聞也龍雖不見豫而遺聲于豫是龍終不忍禍豫不然唱浪花而棄豫也鯖魚藤江鯖魚形象草色青黑大者百餘斤取用釣筒其膽治目魚大膽小者上上魚大膽大者上中魚小膽大者中下漁者得魚詣官親剖官稅其膽始敢出市私開者杖今售者皆以膽灌黃藤膏偽為之黃藤亦行血去翳辨之不精必見笑于魚目白妾魚白妾魚出大荒山深澗中一名婢妾臉若芙蓉膚如凝脂有天然肉結嚲若垂雲長四尺五寸臍下有帶白光映人胡天星邀豫作鱠香脆甘美水陸無有方者諸君聞獲是魚盛禮來賀豫瞷其所答皆不多其油止妬其他伴禮者熊掌虎皮麝香鴆箭紛如也貴重如此楚辭魚鱗鱗兮媵豫意者指此豫賦詩云獨尋芳草過王孫為愛銀絲水露盆湯煴玉環妃子淚樓殘金谷緑珠魂凌波豈復觀微步齒劍終然合報恩誰識蒯侯歸思苦不堪彈鋏向朱門印魚印魚方額有文印類竹葉符鳴如鐘鈕長尺有三寸巨魚將死以印封之豫在龍門灘愛其神怪市而放之獻者弗識也海蠻師海蠻師魚身虎頭無鱗甲短闕利爪渾身豹文長八九尺見人泣數行下蛋人網得輒復放之潛州留東粵曰潛牛西曰潛州留楚曰鰅鱅出澗與虎鬬角軟用水一湛堅則復鬬豫在湘中見之桞子厚云桂江秋水露鰅鱅鬼魚鬼魚似鱷用以禱鬼克敵人悮食之立死請巫呪之立生忽雷忽雷鱷魚也居溪渚中以尾鈎人而食之扶南王范尋有神術常于大雲山鑿池蓄魚決獄有罪者投之無罪魚弗食也今其枯骨齒椓復生用作樂器聲極啁啾經云河有怪魚厥名為鱷其身已朽其齒三作王虺王虺江北曰虺江南曰蝮首大如臂背青腹赤有齒極毒吃人立死大招南有炎火蝮蛇蜒鰅鱅短狐王虺騫九頭者曰雄虺天問雄虺九首憊忽然在不須吃人見之立死猶叔敖之兩頭蛇也豫謂見者殺之亦成佳事吳都賦云雖有雄虺之九首將抗足以跐之短狐短狐人所生也詩曰蜮書曰射工騷曰短狐斑衣山子插青銜弩裸體獸交遺精降于草木嵐蒸嶂結盎然化生狐長三寸狀若黃熊口銜毒弩巧伺人影胎性使然豫南海有水闕蟲四月一日上弩八月一日卸弩亦然射人與此不同豫遊六磨影落澗水為短狐所射毒中左手適欲朴殺有大蟾鼓腹踴躍扼其喉而食之未幾痛入骨髓始如蟻卵乍如蜂房乍如盤渦乍如蛇菌一日一夜其變百出其大二寸聞過三寸則死毒大如狐則死對時則死遍走羣醫命在呼吸蘧然省蟾能食之必能制之適有八字丹蟾跳躍草際取向毒處一吸支體立運毒口出涎滴石石爛魂魄潮復如坐氷壺其口兩月方合聞鴛鴦鷲皆能食之腦可止痛使我求之恐為枯魚所笑赤蟻赤蟻大若象渾身帶火力負萬鈞雜食虎豹蛇蟲遺卵如斗山人取為醬是名蚳醢見于周官蚺蛇蚺蛇尾有鈎口無齒其聲甚怪似貓非貓似虎非虎擊之則闕猶龜焉灼之則鳴也九十丈者吞蟻六十丈者吞象三十丈至九丈者吞豺狼虎豹與鹿豕人吞之法以尾鈎卷定以氣沖死濡濕乃吞吞畢懸于樹上絞至糜爛骨角皆從皮出望之若神龍脫骨云拏龍部署蛇過三十丈者皆稱龍爰緝婦裙以為旗纛爰斬烏鹽以紏鎗簇爰斫葛藤以陶纜索金鳴則進旗卷則退口含酒糟服帶毒槊蛇長一丈旗手一人鎗手十人弩手五人金手二十人金手藤弩手牌鎗手鹽旗手酒其勝也金振旗開鎗損弩發金手進藤主束也鎗手進鹽主剝也旗手進酒主勞也旗手得膽鎗手得皮弩手得眶金手得肉其敗也鎗護旗退牌護鎗退藤護牌退蛇長十丈其數十之蛇長百丈其數百之豫遊諸山見獵九蛇長九丈者有五長八丈者有三長十有一丈者有一天問一蛇吞象厥大何如間世而出土人亦不概見况吞蟻者乎若夫三周崑崙又吞蟻者之海若也蛇名蛇一字名者青蛇赤蛇白蛇烏蛇青主神赤主火白主傷烏主藥其他曰藤曰蚺曰鱗曰蝮曰水曰穀二字名者曰率然危干水箭烏稍量人默稱烏肉瞎目雞冠鱉腦人頭馬鬃笋籜菜花寸白水豹三字名者幹壁虎黃藤蚺青標竹師箕押金角帶七寸錦過按容凡蛇盤者皆在壬地蚺無棄物蚺蛇三膽一附於肝者止痛一水膽白漿止㵼一膽隨月擊其處則隨至名護身闕最佳眶辟邪殺鬼佩之吉祥肉辟風寒皮過三十丈者曰龍皮一端千金波斯市之為鼓聲震百里蝍蛆蝍蛆一名蜈蚣狀若水蝦小至一寸大至一丈其尾閃閃有光山中修蛇無故而死者彼斃也蛇腐化為蝍蛆猶螟蛉之呪子也儒書藤蛇遊霧而死於蝍蛆赤雅卷三
