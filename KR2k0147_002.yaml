body:
  text: 赤雅卷二眀鄺露撰山川論略豫窮歷九郡南盡衡山然後知先王建國親侯其道大也夫先王建國必因山川守逺近辨物色以左右民故建瓴之勢立臂指之義順勢立而內強義順而外服然後霸王之業可成也若悉割兩江東包廉欽潯鬱以北盡乎宜桞之境屬之南寧使自為牧鎮則兩江溪洞可馳尺版而服即用兩江之兵南略交趾優有餘裕矣此所謂臂指之義也若夫桂林固衡湘地也天文分野上屬翼軫九嶷蒼梧之山形勢是衍首起衡嶽腹盤八桂而尾逹乎蒼梧湘灕二水分繞其下桂林據其上遊若屋極焉衡永邵道桂栁諸郡綴附廣西並故轄桂昭三郡其封略固已偉矣此所謂建瓴之勢也况荆湖地逺行部使者病不能遍衡湘數郡歲調兵食以給廣西猶之不屬之屬也豫説知屬狂僣語曰芻蕘之言眀者擇焉山川崇山崇山有歡兜故宫四十里即至越裳杉谷起古崇山竹溪從道眀國來於崇山北二十五里合水敧缺藤竹眀媚有三十峯夾水直上千餘仞諸仙之窟宅也石人山石人山下枕藤水三兩對坐舉指興會丰姿闕之不來方知其為石矣鬼門關鬼門關在北流四十里兩峰對峙中成關門諺云鬼門關十人去九不還日暮黑雲霾合隂風蕭條蒼鼯啼而鬼鎖合天雞啼而蛇霧開唐宋詩人謫此而死者踵相接也行數武有一大石甕中有骷骸骨五色腸皆石乳凝化豫大書四字其上曰詩人鮓甕見者毛骨森森黃魯直人鮓甕中危萬死鬼門關外更千岑沈佺期昔傳漳江路今到鬼門關此去無人老遷流幾客還崑崙關狄武襄上元夜奪崑崙關破儂智高關扼賔灉兩界水於此南北分岐嶺險仄皆通諸夷若據崑崙須防間道粵西入安南三路一繇憑祥州出鎮南關一日至六淵州一由思明州入􅏀溫過摩天嶺一日至思陵州一由龍州入一日至平西隘容州三洞天都嶠太上寶元洞天白石秀落長真洞天勾漏玉關寶圭洞天七究南方山溪間謂之究有西古郎究金山郎究越裳究九德究南陵究文狼究無勞究金雞究二壺城牂柯滙龍融二江過桞州環繞如壺謂之壺城水既北來還轉向北城則居其腹也所謂江流曲似九回腸也太平亦有壺城北曰壺關水形不異但差小耳太平則五石之匏龍城則長房之壺也蘭麻道自理定西行蘭麻烏沙峯峰刺天僅容足又極險隘無間道每過嶺擘天直上至絶頂又懸空而下綿連不窮聞之飛雲九折尚能服牛乘馬方之蔑如矣勾漏洞勾漏洞在地上不煩登涉外厰豁內幽邃暗溪穿貫與北流水合乘桴而逰水清無底瀠洄詰屈與石爭竒仰見大星炯然審視乃石穿一孔透天光入依依如貫月槎洞對髙崖飛鳥斂翼靈境罕祕夏間荷葉田田若見荷花歲必大稔立魚巖巖在桞城西南數里許山小而鋭似魚怒升之狀腹間有洞石分紅白二色若珊瑚枝架白玉樓李白岩巖在藤縣高五十餘丈中多翡翠白猿澤芝芳杜有天然琴寉下激流水白流夜郎嘗憩於此何矦山何矦山在蒼梧堯時有何矦者隱此夏禹時五帝賜樂器一函拔宅上升今為太極真人火山蒼梧火山傳聞南武趙陀埋神劍於此又云下有寶珠月星皎潔冷光燭天如峨眉落伽南嶽聖燈之狀其在泰山謂之仙燈羅浮謂之珠燈崇善白雲洞謂之仸燈隆安火焰泉夏則有光謂之龍燈君山謂之蛟燈豫所見者多不能盡述要之􅐱道元云火山似山從地中出謂之熒燈其説似長對山為氷井寺銀殿山銀殿山在昭州恭城與九疑相望山皆白石四隅生白石笋其高觸天浮雲繞之狀如宫闕對麓曰金芝岩金堂紫房是其自出陽朔道上諸峰陽朔諸峯如笋出地各不相倚三峰九疑析城天柱者數十里如樓通天如闕刺霄如修竿如高旗如人怒如馬嚙如陳將合如戰將潰灕江荔水織其下蛇龜猿鶴焯耀萬態退之水作青羅帶山為碧玉簮子厚海上千山似劍鋩秋來處處割愁腸子瞻繫悶豈無羅帶水割愁還有劍鋩山魯直桂嶺環城如堆宕蒼山平地忽嵯峨皆實録也七百里松隂古道自桂城北至衡湘七百里皆長松夾道秦人置郡時所植少有摧折歷代必補益之龍拏鳯跱四時風雲月露任景布怪色色絶倫豫行十日抵興安至今夢魂時時見之獨秀山獨秀山狀如黼冕有王公貴人之象顔延之出守讀書其中有五咏堂西有雪洞乳石最竒下臨月牙池山翠盡落今入靖江王邸中飛樓舞閣隱出樹杪金碧華蟲絢爛極矣對之如一幅小李山水圖麗而不俗疊彩山西清寶積山附桂城北重門夾山東曰疊彩西曰西清狀如石城玉壘山麓曰夀聖寺寺後有穴自然生風丹陛赫而含凍烏鳶墮而清暑名曰風洞風洞左折曰疊彩洞竒石堆垜燦若瓊珉其後則堯山蔽天而下前眺灕水鬬雞白雉巨象槖駝若馱經聽法之狀其左一峯曰平越右一峰曰四望浮雲淹日月長江亘終古水落瀟湘寂寥長邁北人至此多軫鄉情元常侍搆齊雲亭其上志思也豫旅逰寡情鄉思已絶笑讀亭記謂未必爾有頃見獨秀山金碧輝煌溪徑歷歷憶去年殘臘與喬生宋玉同憑一几看小李將軍畫宛然在目作詩寄之朗吟之間不覺落淚喟然嘆曰古之人不豫欺也於是循嶺而下逰混沌岩明月已舉見蟬鶴千越諸峰石紋橫布純為紫黛真巨靈之鴻彩也徐步過華景洞入巖光亭亭後雉堞四垂磊砢多石篆西清寶積山聞秦城角聲而返時夜將半榕樹門榕樹門古桂州南門唐時所築上有榕樹一枝兩根苞躔軌礦跨門而生車馬轔轔皆從樹根而出至正間忽枯平章唐元公祀之復生桂林三嶠臺城之嶠在大庾騎田之嶠在桂陽都龎之嶠在九真萌渚之嶠在臨賀越城之嶠在始安是嶺有五而桂擅其三矣按騎田接郴州今名黃岑山或名黃箱山也其支峯楚粵分界萌渚即桂嶺在冨春北與楚江華為界水南北分流其山産錫又名錫方在城中者乃西清寶積山也志載誤越城在湘灕二源間今名分水嶺華巖洞華巖洞在靈川西南二十里高數仞顯敞寡儔香泉縈繞世傳常有桃花片濶寸許從洞中流出壁上仙人詩云巖前流水無人渡洞口碧桃花正開東望蓬萊三萬里等間歸去等間來屛風山雙巖劃天拔地峭竪外無雜樹彌望皆長松巖中十餘丈隆起如層臺側有緑石髙二丈形如覆鐘水滴乳鳴嘡嗒不絶躡石磴五十盤出通明門山川城郭歷歷如指掌其下為壺天觀秦城秦始皇發卒戍五嶺地為秦城城北二十里有嚴關鳥道不可方軌秦取桂林象郡兵勒湘南握其咽喉臨瀜灕二水間去桂城八十里寶圭洞寶圭洞即勾漏正洞石室中玉宸道君及葛真人石像五季時迎至南海者寶圭在室東秉燭而入見丹灶床几盤甕碾臼詭形怪狀神摹鬼刻約半里至水涯循梯而下棹小舠以行波光澄明蒸藹溫燠四時無冬春舉首見金光如長虹亘天表乃石罅透日影而下捨舟躡梯扳援直上曲登飛棧如瑤階玉埒小石細碎羅列如杯如斚又如楊梅荔枝充滿垜疊莫可名狀轉仄僅容跬步直穿太隂洞後出山腹則寶圭之東洞中室曰蟠桃廣三四百步仰視高處不見其頂西小室洞門外矚自然石榻平鋪疊架可眠可踞與東洞對正如兩掖水月洞水月東距勾漏三十里骨脈嶔崎至水月則石體愈瘦峯􅲠愈峭西北清澗瀠回曲折跨野橋渡澗入洞虛眀爽塏可坐數百人乳溜凝懸清湍互激若海若獻珍眀珠巨貝錯出於驚濤怒浪中右折秉炬入洞水石益怪削為芙蓉伸為仙掌渦為盤立為柱爰有神鉦懸如滿月擊其兩面作雌雄聲石坎通澗以火燭之羣魚皆舞扳巖鑿空出西南左折一峯峭竪洞在其腹是名天馬馬蹄踏石入寸許不計其數天馬西行度兩峯抵鈎天洞洞出山半石廉利不堪正步手援足徙至一小潭越潭至洞洞枕潭水有石如頺雲垂垂下叩之若考鐘又有懸磬戞之如哀玉洞下有洞叩之鏜鞳有聲復陟上洞軒豁敞朗天光入焉其廣可列數筵令人下洞伐鼓鐘聲滿天地仙仙乎如坐九霄聆鈞天之奏七星棲霞洞洞口懸空如碧玉壺匪員匪方如日落波心動蕩成質從洞口入石索懸錦鯉魚挂于雲半左有石樓唐祀玄元于此乾寧中臨賀令鄭冠卿來遊遇二客飲酒奏樂與之笛不能聲臨别謂冠卿曰方今四海鬬爭羣雄角立重斂贍兵蓋亦天數王喬許遜之徒皆臨官即升道果子其勉之出晤負芻曰碧空之樂汝知之乎乃曰華月華君也跬步失所在後門為元風洞洞內一灣流水莫知去來上跨石橋中有石蓮鬚瓣畢具嗅之微香半開半落于其中過此非炬不矚次龍潭次仙人卷衣次鳴球次鳯翔次石田墩塍歷歷廣二畝許其康莊坦途者約六七里其險仄不能通人者竅洞庭通九疑靈怪不可致詰元巖南溪之隂枕新泉連幽野田園雞犬疑非人世中有大石屋俯臨清漪仰㺯白日真竒觀也其中一洞九室西南曰白龍西北曰元巖夕陽千峯桂水一碧元巖之上曰丹室白龍之右曰夕室龍洞仙窟仙室又北曰石室九洞谽砑乳脂凝注一俯一仰如傘如輦如欒櫨支撑如蓮幕藻井左顧右盼似簾似幃似偃松敧竹似海蕩雲驚中有玉池玄井唐李渤玉池若無水玄井昏不測山之陽曰劉仙巖玩珠洞伏波山東枕灕水盤盂鑽注驪龍穴焉洞名玩珠高數百丈如層城復道其最竒者有石懸空而下狀若浮柱去地一線不合聞昔有神人名揭諦者試劍于此下産玉樹似珊瑚枝而白慶元中朱晞顔獲一小枝價值千金刻石識之其上有米元章書高宗贊劉仙巖巖下有大道觀草穢不治多怪狐門枕松衢謖謖作波濤聲觀後上巖飛磴嶕嶢苔滑如脂猱步猿扳􅔰岸岸上書太空子隱居處宋李師中筆也中多真人口訣飛湍界絶斑剝如赤文緑字險不可讀左折有巖曰穿雲由穿雲入劉仙巖幽石玲瓏螭連蜃結耳目一開夫枕清漪玩芳芷花猶地植鳥似家禽則劉仙不如九洞橫目四視一一平若水千峯刺天如笋出地又九洞之所無也傍曰通眀閣懸巖架楹險竪毛髮見一道者隅目髬髵與之語瞪而顧唉而欷憧憧如鹿麋弗接也袖中見其指爪鋒攢似來攖人豫少避之即凌崖而飛若彈丸之驚栖鶻耳嘻豈若士汗漫之流與雉山巖雉巖枕灕水石磴盤虛上梯禪室右折重巖襲石空翠濕人而花凌屐中有石穴扄錮不開一云白雉聞經化人仙去遺蛻在焉中搆小亭顔曰雉巖字形拗拙劉晞之筆也亭左入右紆回窄額至青蘿閣環忩竒石簇簇逼人上浮雙石如大鳥翼若摶扶搖而上者乃所謂雉巖也灕山陽江西注東滙灕水南臯一山形如巨象中流屓贔力抵狂瀾有北招伏波南引鬬雞白雉索馱并力行江之勢鼻中巨孔白如截肪日月東西跳丸其上名曰水月洞虞山帝祠虞山秦松夾道有駕蒼虬翼紫鳯乘龍南巡之勢其制度外朝內寢配以二妃其儀物圭鬯冠衣劍佩三十有九助贊幘衣一十有六籩豆簠簋彛鬲洗樽鼎盉爵卣幡鼓絙瑟七十有七廟後有洞曰韶音洞見招隱山魚泛烏瀾若握鏡之望方壺也外有巨石西臨黃潭宋之問詩在焉祠左有南薰亭灕江諸勝目可覽結庾闡溫子升張子夀之文李陽氷之篆趙觀文之𨽻藻飾帝猷為諸山之闕龍隱山龍隱七星去彈丸一水有神龍劈空而去躨夭矯裂石百尋緣洞入巖如排高闕題曰龍騰有滴玉泉聽之琮琤神魂俱爽有巖日月牙濯魄漣漪皎如朗月上有環翠亭驂鸞閣雨花闕靈怪去而遊觀盛舟車湊而雕鏤繁宋世衣冠填委極矣堯山堯山積土礱石高數百里為桂之冠天將雨白雲先兆昔舜南巡祀堯於此土人因而立祠極其昭格爰有天田以昭祀典爰有靈鳥應樂則鳴其上為白鹿洞漢書始安侯國其下東有駮樂山遼山遼即堯駮樂即白鹿辰山辰山一名虎山重巖疊起頗類中隱下巖初入昏黑十餘武見大光明城闕歷歷巖左飛磴百盤乃至中巖乳石詭怪駭嘆錯愕重經石閣乃至上巖巖上有亭遊目八表若夾日月而行令人有箕山之志忽見苔蘚中數行滅沒乃知有宋髙士劉晞家焉與桂帥李大異為布衣交表其巖曰蟄龍云清秀山從西清下濠入夾口里許有塘清巖出其上桂山皆孤峭此獨連湊水上雙巖東西對闢北郭諸山近在塘腋陽江一水清透巖隙批巖越壑其流汩濦過此水漸緩山漸深中隱山中隱山巖一名仸子巖小溪隔絶如蓬萊清淺涉衣而渡下巖䆸䆸如巨室中巖束削獨瑩潔無纎埃上巖橫絶霄半白日可中看同返照東林磬聲微妙聞外國聖僧禪定於此穿山鬬雞水口即禪丸入灕水處山形如槖駝竦身昻首與雉山西對首上有穴南北橫自鐫曰空明山宋人胡摫題日月巖琴潭山琴潭山在西郊關外下有空洞洞皆流水觸石成聲如聞雅奏旁有荔枝巖窅然深秀多竒石宋之問詩荔浦蘅臯蓋謂此也遊桂林招隱山小記自西湖至招隱山二里山光水碧石門劍立矍然若神物持之西折北牖洞綺忩串玉下則巖水潑墨巨魚金鬛朱鬐北壁有穴如門出門為金龜潭潭盡芰荷外為濛溪橫五里徑二百步今皆灌為田矣東南轉嶺石林夾聲至朝陽洞洞口直下二十步有水傍清潭側南望玉乳如飛燕擁雪南陟飛梯四十級有雙碧玉盤二乳滴下聲如清漏又九級有白玉盤自然出水可飲十人豫寫張衡四愁其上還自石盤東北上十二級得石堂乳穗並垂戞之錚錚哀玉自堂北出西入小峽得內洞東有石室如畫頂上方井華蟲綺藻自洞南下仰矚洞崕小樓雙石人如舞閣妖姬搴楯窺客自樓閣斗下次蛟渠渠跨石梁長三百步非列炬弗進南抵絶壁飛梯九盤及水是為玄潭下有石閣綴以危檻景落潛囦羣龍競吸自石閣還上絶壁四十步得小洞僂行三十步左右鍾乳朗然映入有穴通嘉蓮洞從洞出六十步有石室多白蝙蝠又北上得外洞壁下有石其面砥平有白石琴薦可撫清絃東有便房節梲桁櫨凹樽曲几鬼工之追琢也北七步臨西闕門至夕陽洞深九丈許崖北有道可以專車崖南有闕可以鏡魚自南北崖下眺南潛北潛二洞有連理松連理橘偃蓋柏玲瓏鐡幹連卷怪石香臺梵剎皆從枝葉間出自西洞口去一矢得南華洞西有石可容數榻東有清泉一矢得白雀洞洞口隘狹摩臍擦耳側身通人北上山頂盤曲五百步硉兀竒聳靈石峙于南東松蘿萃于西北闕其水自嘉蓮經白雀歷朝陽傍侵北牖闕南華而入于湖又一派自濛溪源北牖之北出于北山南滙南華而入于湖其六洞小篆皆唐李渤所書然兹山雖竒著勝在水宋人灌之為田乾道張徽猷作斗門閘之作復西湖記嘉靖中復灌為田噫負郭有田而豪傑無奮庸矣水三江灕江一名桂江南注平樂出梧州陽朔而下龍門而上屬平樂府者俗名府江左江發源交趾經麗江朗寧橫貴東出潯州右江自牂柯入粵徑融桞烏泥西來注之又經象武合左江于潯合灕于梧而東入于海按地形左宜為右右宜為左夫粵處南陬之左皆從東闕或下灕水遡流送上從遡流者分左右不從地形分左右也又南亦有左右江左出廣流右出峨利會于合江鎮入橫州是左江之中又有左右江也重復不易辨豫謂出廣源者古夜郎遁水也古名鬱山右出峨利者古交濛泓水也古名黔江南寧二江又當從古牂柯牂柯繫船杙也頃襄王遣莊蹻伐夜郎至蘭椓船于岸趨步滅夜郎名之以著竒績牂柯戨牁皆同烏泥烏泥出盤江多伏流或落漈數百丈飛濤走浪十數里夾沙土混混如黃河查浦晉咸元中有靈查來泊灘上黑如純漆堅如瓊玖非皇娥所乘即張騫之泛浩劫以前物也上有浮查館唐宋詞人多題咏湘水湘水之出于陽朔則觴為之舟至洞庭則日月若出入于其中也靈渠靈渠自北而南三十二陡由灕通鏡鼓水自東徂西入永福六陡六陡冬月涸絶不行豫過陡時水長月明如層臺疊壁從天而下陽塘漩桂皆山漩桂皆水也灕江陽江彈丸西湖白竹躔城郭匝日域姑未暇論即城中揭諦梓潼華景西清色色入品惟陽塘最勝陽塘東西橫貫中束以橋東曰杉湖西曰蓮闕征蠻幕府鎮守舊司南北相望演漾各數百畝臨水人家粉墻朱榭相錯如繡茂林缺處隱見旌旗西枕城闉陽水入焉豫先一日憶吾家花田遊舸有詩云芙蓉葉爛不還鄉五月玄巖尚怯霜夢見花田看越女手擎丹荔倚斜陽及遊陽塘風開翠扇水泛紅衣杜若芳洲不減花田珠海紅渠白蕊不減丹荔素馨紈綺王孫不減三城俠少詞郎佳句不減水部風流金谷佳人不減濵海素女至如玉山紫黛金削芙蓉倒蘸氷壺天光上下則吾家之所無也昔人謂楚南山川造化以慰夫賢而辱于此者豫雖非其人而所慰倍多于人觀其所慰而天地之情見矣井泉犀泉犀泉出富川縣坎深丈許長四丈橫可八尺緑蘿紫藤蒙結坎上觀者呼之應聲即出須臾盈科婆娑泉婆娑泉出思恩縣形如玉臼潔似清水飲者呼之渴消則止一人千人亦復如是潄玉泉潄玉泉出白石洞天每鐘鼓動則踴躍而來聲歇隨縮山泉靈異可與夀州出泉茅山喜客泉撫掌泉無為州笑泉並入靈品緑珠井緑珠井在白州雙角山下有七孔是多刺孔吸此井者誕女必麗今以巨石塞其一孔女絶麗損一竅緑珠梁姓石崇為交趾採訪使以珍珠三斛致之善吹笛傳其弟子宋褘後入宋明帝宫梁氏為白州望族立祠春秋祭之笛譜猶存豫謁祠得借抄覽豫説諸父老曰緑珠不負季倫公等立祠表彰高節宜開復舊井幼女何罪毋自苦父老然之即日徙石後之佳人倘有識於豫言楊妃井楊妃井最冷冽飲之美姿容下多香草在容州雲凌里妃名玉奴别字玉環號太真母葉氏孕十三月而生都督步署楊康求為女才貌雙絶楊元琰為長史以勢求之攜至京師選入夀邸時年十四明皇召見賜西王母服色入宫杜詩西望瑤池降王母蓋諷之云赤雅卷二
